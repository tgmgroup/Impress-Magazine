	<script>
		// Set dark mode as the default
		document.body.classList.add("dark-mode");

		// Check local storage for user's preference
		const toggleButton = document.getElementById("dark-mode-toggle");
		const themeImage = document.getElementById("theme-image");

		// Check local storage for user's preference
		const isDarkMode = localStorage.getItem("darkMode") === "true";
		if (isDarkMode) {
			document.body.classList.add("dark-mode");
			themeImage.src = "/Logo/Black Logo.png"; // Set the dark mode image
		} else {
			document.body.classList.remove("dark-mode");
			themeImage.src = "/Logo/White Logo.png"; // Set the dark mode image
		}

		// Function to toggle dark mode
		const toggleDarkMode = () => {
			const isCurrentlyDark = document.body.classList.toggle("dark-mode");

			// Change the image based on the mode
			if (isCurrentlyDark) {
				themeImage.src = "/Logo/Black Logo.png"; // Set the dark mode image
			} else {
				themeImage.src = "/Logo/White Logo.png"; // Set the light mode image
			}

			// Save user preference to local storage
			localStorage.setItem("darkMode", isCurrentlyDark);
		};

		// Event listener for the toggle button
		toggleButton.addEventListener("click", toggleDarkMode);
	</script>
